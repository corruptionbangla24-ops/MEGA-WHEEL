<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROYAL LUCKY WHEEL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🎰 ক্যাসিনো হেডার প্যানেল -->
    <div class="header">
        <div class="brand">
            <div class="name">LUCKY WHEEL</div>
            <div class="game">ROYAL FORTUNE</div>
        </div>
        <div class="balance-box">৳ <span id="user-balance">0.00</span></div>
    </div>

    <!-- 🎡 ৩ডি গোল্ডেন ফরচুন হুইল এরিয়া (২৪টি পিউর মাল্টিপ্লায়ার ঘর ভাই ভাই) -->
    <div class="wheel-outer-zone">
        <div class="pointer">🔺</div>
        <div class="wheel" id="main-wheel">
            <!-- ২৪টি রাজকীয় ঘর এখানে ডায়নামিক জেনারেট হবে ভাই ভাই -->
        </div>
        <div class="wheel-center-pin">⭐</div>
    </div>

    <!-- 🏆 ইন-লাইন লাইভ স্কোরিং মেসেজ বার -->
    <div class="win-status-container" id="win-status-box">
        <span id="win-text-msg">আপনার বাজি ধরুন এবং চাকা ঘোরান!</span>
    </div>

    <!-- 🎛️ কন্ট্রোল প্যানেল এরিয়া (বেট প্লাস-মাইনাস ও ১-২০০০ রেঞ্জ বুস্টার লক ভাই ভাই!) -->
    <div class="footer-controls">
        <div class="quick-bets">
            <button class="q-btn active-bet" onclick="setQuickBet(10)">৳১০</button>
            <button class="q-btn" onclick="setQuickBet(100)">৳১০০</button>
            <button class="q-btn" onclick="setQuickBet(500)">৳৫০০</button>
            <button class="q-btn" onclick="setQuickBet(2000)">৳২০০০</button>
        </div>

        <div class="play-section">
            <div class="bet-selector">
                <button class="bet-btn-nav" onclick="adjustBet('minus')">−</button>
                <div style="text-align: center;">
                    <div style="font-size: 10px; color: #aaa;">BET</div>
                    <div style="font-size: 16px; font-weight: bold;" id="bet-display">৳১০</div>
                </div>
                <button class="bet-btn-nav" onclick="adjustBet('plus')">+</button>
            </div>

            <button class="play-btn" id="spin-btn" onclick="handleWheelSpin()">SPIN</button>

            <div class="icon-group">
                <button class="icon-btn" id="auto-btn" onclick="toggleAuto()">🔄</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
        const urlWallet = urlParams.get('wallet') || "main";
        
        const SERVER_URL = window.location.origin;

        let balance = 0.00;
        let currentBet = 10; // ডিফল্ট বেট ১০ টাকা লক ভাই ভাই
        let isSpinning = false;
        let isAuto = false;
        let autoInterval = null;
        let currentRotation = 0;

        // 🎡 [আপনার রিকোয়ারমেন্টের ২৪টি পিউর মাল্টিপ্লায়ার ঘর সিঙ্ক ভাই ভাই]
        const prizes = [
            { text: "x0", color: "#2c3e50" }, { text: "x1.5", color: "#10ac84" },
            { text: "x2", color: "#ff9f43" }, { text: "x0", color: "#34495e" },
            { text: "x5", color: "#9b59b6" }, { text: "x10", color: "#10ac84" },
            { text: "x0", color: "#2c3e50" }, { text: "x20", color: "#ee5253" },
            { text: "x0", color: "#34495e" }, { text: "x50", color: "#00d2d3" },
            { text: "x100", color: "#ff9f43" }, { text: "x1", color: "#2ecc71" },
            { text: "x0", color: "#2c3e50" }, { text: "x1.5", color: "#10ac84" },
            { text: "x0", color: "#34495e" }, { text: "x200", color: "#9b59b6" },
            { text: "x0", color: "#2c3e50" }, { text: "x500", color: "#f1c40f" },
            { text: "x1", color: "#2ecc71" }, { text: "x2", color: "#ff9f43" },
            { text: "x0", color: "#34495e" }, { text: "x1000", color: "#f1c40f" },
            { text: "x0", color: "#34495e" }, { text: "x1", color: "#2ecc71" }
        ];

        const wheel = document.getElementById("main-wheel");
        prizes.forEach((prize, index) => {
            const angle = (360 / prizes.length) * index;
            const segment = document.createElement("div");
            segment.className = "wheel-segment";
            segment.style.backgroundColor = prize.color;
            segment.style.transform = `rotate(${angle}deg)`;
            segment.style.clipPath = "polygon(0 100%, 100% 0, 100% 45%)";
            
            segment.innerHTML = `
                <div class="segment-content" style="transform: rotate(7deg) translate(10px, -5px); font-size: 8px;">
                    ${prize.text}
                </div>
            `;
            wheel.appendChild(segment);
        });

        if (typeof io !== 'undefined') {
            const socket = io();
            socket.on("balanceUpdate", (data) => {
                if (data && data.username === urlUserId) {
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    fetchLiveBalance();
                }
            });
        }

        async function fetchLiveBalance() {
            try {
                const response = await fetch(`${SERVER_URL}/api/wheel-balance?userId=${urlUserId}&wallet=${urlWallet}`);
                const data = await response.json();
                if (data && data.success) {
                    balance = parseFloat(data.balance);
                    document.getElementById("user-balance").innerText = balance.toFixed(2);
                }
            } catch (e) { console.error("Balance lag"); }
        }

        window.onload = () => {
            if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            fetchLiveBalance();
        };

        function setQuickBet(val) {
            if (isSpinning) return;
            currentBet = val;
            document.getElementById("bet-display").innerText = `৳${currentBet}`;
            document.querySelectorAll(".q-btn").forEach(b => b.classList.remove("active-bet"));
            event.target.classList.add("active-bet");
            playAudio('click');
        }

        // 🎯 [১-২০০০BDT কড়া বাজি কন্ট্রোলার ইঞ্জিন ভাই ভাই]
        function adjustBet(action) {
            if (isSpinning) return;
            if (action === 'minus' && currentBet > 1) {
                if(currentBet <= 10) currentBet -= 1;
                else if(currentBet <= 100) currentBet -= 10;
                else currentBet -= 100;
            }
            if (action === 'plus' && currentBet < 2000) {
                if(currentBet < 10) currentBet += 1;
                else if(currentBet < 100) currentBet += 10;
                else currentBet += 100;
            }
            if (currentBet > 2000) currentBet = 2000;
            if (currentBet < 1) currentBet = 1;
            
            document.getElementById("bet-display").innerText = `৳${currentBet}`;
            document.querySelectorAll(".q-btn").forEach(b => b.classList.remove("active-bet"));
            playAudio('click');
        }

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById("auto-btn").classList.toggle("active", isAuto);
            if (isAuto && !isSpinning) handleWheelSpin();
            playAudio('click');
        }

        async function handleWheelSpin() {
            if (isSpinning) return;

            document.getElementById("win-status-box").className = "win-status-container";
            document.getElementById("win-text-msg").innerText = "🎰 ভাগ্যের চাকা অন ফায়ার...";

            isSpinning = true;
            document.getElementById("spin-btn").disabled = true;
            
            // 🎵 চাকা ঘোরার সাথে সাথেই আপনার দেওয়া wheel1.mp3 গড়গড় সাউন্ড ফায়ার লক ভাই!
            playAudio('spin');

            try {
                const response = await fetch(`${SERVER_URL}/api/wheel-spin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: urlUserId,
                        amount: parseFloat(currentBet),
                        wallet: urlWallet
                    })
                });

                const data = await response.json();

                if (data && data.success === true) {
                    balance = parseFloat(data.balance);
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    if (window.top) window.top.postMessage({ action: "refresh_wallet" }, "*");

                    currentRotation += (3600 + data.targetAngle); 
                    wheel.style.transform = `rotate(-${currentRotation}deg)`;

                    setTimeout(() => {
                        showFinalPrize(data.prizeText, data.winAmount, data.multiplier);
                    }, 5000);

                } else {
                    alert(data.message || "❌ Insufficient Balance! Please Recharge.");
                    stopWheelState();
                }
            } catch (err) {
                alert("⚠️ সেশন আউট! আবার স্পিন দিন ভাই ভাই।");
                stopWheelState();
            }
        }

                function showFinalPrize(prizeText, winAmount) {
            const msgBox = document.getElementById("win-status-box");
            const textMsg = document.getElementById("win-text-msg");

            if (winAmount > 0) {
                // 🎯 [মেগা উইন সাউন্ড ফিল্টার লক ভাই]: লাভ অনুযায়ী উইন, বিগউইন ও হুইল সাউন্ড ফায়ার হবে!
                try {
                    if (winAmount >= (currentBet * 5)) {
                        slotSounds.bigwin.currentTime = 0;
                        slotSounds.bigwin.play(); // ৫ গুণের বেশি মেগা উইন হলে bigwin1.mp3 বাজবে ভাই ভাই!
                    } else {
                        slotSounds.win.currentTime = 0;
                        slotSounds.win.play(); // সাধারণ উইন হলে win1.mp3 বাজবে ভাই ভাই!
                    }
                } catch(e) { console.log("Win audio play lag"); }

                msgBox.className = "win-status-container win-glow-bar";
                textMsg.innerText = `🏆 মেগা উইন!! আপনি পেয়েছেন: ${prizeText} (৳${winAmount})`;
            } else {
                msgBox.className = "win-status-container lose-glow-bar";
                textMsg.innerText = "❌ ওহ! এই রাউন্ডে ভাগ্য সহায় হয়নি। আবার ট্রাই করুন ভাই!";
            }

            document.getElementById("user-balance").innerText = balance.toFixed(2);
            stopWheelState();

            // অটো স্পিন মোড সচল ট্র্যাকিং লক ভাই ভাই
            if (isAuto) {
                autoInterval = setTimeout(() => {
                    if (isAuto) handleWheelSpin();
                }, 2000);
            }
        }

        function stopWheelState() {
            isSpinning = false;
            document.getElementById("spin-btn").disabled = false;
            if (!isAuto && autoInterval) {
                clearTimeout(autoInterval);
            }
        }

        // 🎯 [৪টি ওরিজিনাল সাউন্ড ও প্রি-ক্যাশিং বাফার গেটওয়ে লক ভাই ভাই]
        const slotSounds = {
            click: new Audio('click1.mp3'),
            spin: new Audio('wheel1.mp3'),
            win: new Audio('win1.mp3'),
            bigwin: new Audio('bigwin1.mp3')
        };
        
        // অল-ক্লিন অডিও ক্যাশ বুস্টার লক ভাই
        Object.values(slotSounds).forEach(s => s.load());

        function playAudio(type) { 
            try { 
                slotSounds[type].currentTime = 0; 
                slotSounds[type].play(); 
            } catch(e){ console.log("Audio waiting for user interaction"); } 
        }
    </script>
</body>
</html>
